# Databricks Asset Bundle — workloads only. Platform concerns (workspace, storage, network,
# identities) live in Terraform. That split keeps a job deploy from ever touching infrastructure.
bundle:
  name: gaming-commerce-lakehouse

variables:
  cloud:
    description: gcp | azure
    default: gcp
  environment:
    description: dev | qa | prod
    default: dev
  node_type:
    default: n2-standard-8
  gpu_node_type:
    default: a2-highgpu-1g
  catalog:
    default: gamingcommerce_dev
  databricks_host:
    description: Workspace URL, injected per environment (BUNDLE_VAR_databricks_host in CI)
  service_principal:
    description: Deploy/run identity for qa & prod
    default: ""
  schedule_pause_status:
    description: Batch schedules & continuous streams (PAUSED in dev)
    default: UNPAUSED
  training_pause_status:
    description: ML training schedule (UNPAUSED only in prod)
    default: PAUSED

include:
  - resources/jobs.yml
  - resources/streaming.yml
  - resources/clusters.yml

artifacts:
  python_wheel:
    type: whl
    path: ../
    build: python -m build --wheel

targets:
  dev:
    mode: development     # jobs prefixed [dev user], schedules paused, no concurrent runs
    default: true
    workspace:
      host: ${var.databricks_host}
      root_path: /Shared/gaming_commerce/dev/${workspace.current_user.short_name}
    variables:
      environment: dev
      catalog: gamingcommerce_dev
      schedule_pause_status: PAUSED
      training_pause_status: PAUSED
    run_as:
      user_name: ${workspace.current_user.userName}

  qa:
    mode: production
    workspace:
      host: ${var.databricks_host}
      root_path: /Shared/gaming_commerce/qa
    variables:
      environment: qa
      catalog: gamingcommerce_qa
      schedule_pause_status: UNPAUSED
      training_pause_status: PAUSED
    run_as:
      service_principal_name: ${var.service_principal}
    permissions:
      - level: CAN_MANAGE
        group_name: data-platform
      - level: CAN_VIEW
        group_name: analysts

  prod:
    mode: production
    workspace:
      host: ${var.databricks_host}
      root_path: /Shared/gaming_commerce/prod
    variables:
      environment: prod
      catalog: gamingcommerce_prod
      schedule_pause_status: UNPAUSED
      training_pause_status: UNPAUSED
      node_type: n2-highmem-8
    run_as:
      service_principal_name: ${var.service_principal}
    permissions:
      - level: CAN_MANAGE
        service_principal_name: ${var.service_principal}
      - level: CAN_VIEW
        group_name: data-platform
